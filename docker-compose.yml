version: '3.8'

services:
  # 1. El Núcleo (Gestión de Candidatos)
  maverick-backend:
    build: ./maverick-hunter/backend
    ports:
      - "8000:8000"
    networks:
      - dark-agency-net
    volumes:
      - ./maverick-hunter/backend/app:/app/app

  # 2. La Interfaz Visual
  maverick-frontend:
    build: ./maverick-hunter/frontend
    ports:
      - "3000:3000"
    networks:
      - dark-agency-net
    depends_on:
      - maverick-backend

  # 3. Motor de Riesgo Fundador (IVR)
  founder-risk-api:
    build: ./founder-risk-api/backend
    ports:
      - "8001:8000"
    networks:
      - dark-agency-net

  # 4. Motor de Stress Test Climático (Tu primer éxito de hoy)
  stress-test-engine:
    build: ./stress-test/backend
    ports:
      - "8002:8000"
    networks:
      - dark-agency-net

  # 5. NUEVO: Motor Cuantitativo (Red Neuronal Black-Scholes)
  quant-engine:
    build: ./quant-engine
    ports:
      - "8003:8000"
    networks:
      - dark-agency-net

networks:
  dark-agency-net:
    driver: bridge
